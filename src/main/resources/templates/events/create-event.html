<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Novo Evento — Evently</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/create-event.css}">
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar('dashboard')}"></div>

    <main class="create-event-page">
        <section class="create-event-layout">

            <aside class="create-event-side">
                <div style="margin-bottom: 32px;">
                    <a th:href="@{/admin/dashboard}"
                        style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted, #6b7280); text-decoration: none; font-weight: 600; font-size: 15px; transition: color 0.2s;"
                        onmouseover="this.style.color='#111827'" onmouseout="this.style.color='#6b7280'">
                        <i data-lucide="arrow-left" style="width: 20px; height: 20px;"></i> Voltar ao Dashboard
                    </a>
                </div>

                <span class="side-kicker">NOVO EVENTO</span>
                <h1>Dê vida à sua ideia.</h1>
                <p>Preencha os detalhes para criar uma experiência inesquecível para seus convidados.</p>

                <div class="tip-card">
                    <div class="tip-icon">
                        <i data-lucide="lightbulb"></i>
                    </div>
                    <div>
                        <strong>Dicas!</strong>
                        <p>Eventos com descrições detalhadas e boas imagens têm mais engajamento.</p>
                    </div>
                </div>
            </aside>

            <section class="create-event-card">
                <form id="createEventForm" th:action="@{/events/new}" method="post" th:object="${eventForm}"
                    enctype="multipart/form-data">

                    <div class="form-group full">
                        <label for="title">Título do Evento</label>
                        <input type="text" id="title" th:field="*{title}"
                            placeholder="Ex: Workshop de Design Minimalista">
                        <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="categoryId">Categoria</label>
                            <select id="categoryId" th:field="*{categoryId}">
                                <option value="">Selecione uma categoria</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">
                                </option>
                            </select>
                            <span class="field-error" th:if="${#fields.hasErrors('categoryId')}"
                                th:errors="*{categoryId}"></span>
                        </div>

                        <div class="form-group">
                            <label for="totalSlots">Vagas Disponíveis</label>
                            <input type="number" id="totalSlots" th:field="*{totalSlots}" min="1" placeholder="0">
                            <span class="field-error" th:if="${#fields.hasErrors('totalSlots')}"
                                th:errors="*{totalSlots}"></span>
                        </div>
                    </div>

                    <div class="form-group full">
                        <label for="description">Descrição</label>
                        <textarea id="description" th:field="*{description}" rows="5"
                            placeholder="Conte mais sobre o que vai acontecer..."></textarea>
                        <span class="field-error" th:if="${#fields.hasErrors('description')}"
                            th:errors="*{description}"></span>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventDate">Data e Hora</label>
                            <input type="datetime-local" id="eventDate" th:field="*{eventDate}">
                            <span class="field-error" th:if="${#fields.hasErrors('eventDate')}"
                                th:errors="*{eventDate}"></span>
                        </div>

                        <div class="form-group">
                            <label for="registrationDeadline">Prazo de Inscrição</label>
                            <input type="datetime-local" id="registrationDeadline" th:field="*{registrationDeadline}">
                            <span class="field-error" th:if="${#fields.hasErrors('registrationDeadline')}"
                                th:errors="*{registrationDeadline}"></span>
                        </div>
                    </div>

                    <div class="localization-section"
                        style="margin-top: 24px; padding: 20px; background: #f9fafb; border-radius: 12px; border: 1px solid #e5e7eb;">
                        <h3 style="margin-top: 0; margin-bottom: 16px; font-size: 16px; color: #374151;">Localização
                        </h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="cep">CEP</label>
                                <input type="text" id="cep" th:field="*{cep}" placeholder="00000-000" maxlength="9">
                            </div>
                            <div class="form-group" style="flex: 2;">
                                <label for="address">Endereço</label>
                                <input type="text" id="address" th:field="*{address}" placeholder="Rua, Avenida...">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="number">Número</label>
                                <input type="text" id="number" th:field="*{number}" placeholder="123">
                            </div>
                            <div class="form-group" style="flex: 2;">
                                <label for="complement">Complemento (opcional)</label>
                                <input type="text" id="complement" th:field="*{complement}"
                                    placeholder="Apto, Bloco...">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="neighborhood">Bairro</label>
                                <input type="text" id="neighborhood" th:field="*{neighborhood}" placeholder="Bairro">
                            </div>
                            <div class="form-group">
                                <label for="city">Cidade</label>
                                <input type="text" id="city" th:field="*{city}" placeholder="Cidade">
                            </div>
                            <div class="form-group">
                                <label for="state">Estado</label>
                                <input type="text" id="state" th:field="*{state}" placeholder="UF" maxlength="2">
                            </div>
                        </div>
                    </div>

                    <!-- Ingressos (Tickets) -->
                    <div class="tickets-section"
                        style="margin-top: 24px; padding: 20px; background: #fefeff; border-radius: 12px; border: 1px solid #e0e7ff;">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                            <h3 style="margin: 0; font-size: 16px; color: #374151;">Ingressos (Lotes)</h3>
                            <button type="button" id="addTicketBtn" class="btn-secondary"
                                style="margin-top: 0; width: auto; padding: 6px 12px; font-size: 13px;">
                                <i data-lucide="plus" style="width: 14px; height: 14px; margin-right: 4px;"></i>
                                Adicionar Lote
                            </button>
                        </div>

                        <div id="ticketsContainer">
                            <!-- Tickets serão adicionados aqui via JS -->
                        </div>

                    </div>

                    <div class="form-group full">
                        <label for="coverImage">Imagem de Capa</label>

                        <label for="coverImage" class="upload-box">
                            <span class="upload-icon">
                                <i data-lucide="upload"></i>
                            </span>
                            <span class="upload-title">Clique para enviar ou arraste</span>
                            <span class="upload-subtitle">JPG, PNG ou WebP</span>
                        </label>

                        <input type="file" id="coverImage" th:field="*{coverImage}" accept=".jpg,.jpeg,.png,.webp"
                            hidden>

                        <div class="image-preview" id="imagePreview" style="display: none;">
                            <img id="previewImg" alt="Pré-visualização da imagem de capa">
                        </div>

                        <span class="field-error" th:if="${#fields.hasErrors('coverImage')}"
                            th:errors="*{coverImage}"></span>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Criar Evento</button>
                        <a th:href="@{/events}" class="btn-secondary">Cancelar</a>
                    </div>
                </form>
            </section>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        const form = document.getElementById('createEventForm');
        const coverInput = document.getElementById('coverImage');
        const previewWrapper = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const ticketsContainer = document.getElementById('ticketsContainer');
        const addTicketBtn = document.getElementById('addTicketBtn');
        let ticketCount = 0;

        function addTicket(ticketData = null) {
            const index = ticketCount++;
            const ticketHtml = `
                <div class="ticket-item" id="ticket-${index}" style="padding: 16px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 16px; background: white;">
                    <div class="ticket-header">
                        <div class="ticket-title">
                            <i data-lucide="ticket" style="width: 16px; height: 16px;"></i>
                            Lote #<span class="ticket-index-display">${index + 1}</span>
                        </div>
                        <button type="button" class="remove-ticket-btn" onclick="removeTicket(${index})" title="Remover lote">
                            <i data-lucide="trash-2" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex: 1;">
                            <label>Nome do Lote</label>
                            <input type="text" name="eventTicket[${index}].name" value="${ticketData?.name || ''}" placeholder="Ex: Primeiro Lote, VIP..." required oninput="saveFormDraft()">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                <label style="margin-bottom: 0;">Valor</label>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="font-size: 12px; color: var(--muted);">Grátis?</span>
                                    <label class="switch">
                                        <input type="checkbox" class="ticket-free-checkbox" onchange="toggleTicketFree(this, ${index})" ${ticketData?.value == 0 ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                            <input type="text" class="ticket-value-masked" data-index="${index}" value="${ticketData?.valueMasked || ''}" placeholder="0,00" ${ticketData?.value == 0 ? 'disabled style="background: #f3f4f6;"' : ''} required oninput="handleTicketPrice(this, ${index})">
                            <input type="hidden" name="eventTicket[${index}].value" id="ticket-value-${index}" value="${ticketData?.value || '0.00'}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Quantidade</label>
                            <input type="number" name="eventTicket[${index}].quantity" value="${ticketData?.quantity || ''}" placeholder="100" required oninput="saveFormDraft()">
                        </div>
                        <div class="form-group">
                            <label>Data de Expiração</label>
                            <input type="date" name="eventTicket[${index}].expirationDate" value="${ticketData?.expirationDate || ''}" required oninput="saveFormDraft()">
                        </div>
                    </div>
                </div>
            `;
            ticketsContainer.insertAdjacentHTML('beforeend', ticketHtml);
            lucide.createIcons();
            saveFormDraft();
        }

        window.removeTicket = function (index) {
            document.getElementById(`ticket-${index}`).remove();
            reindexTickets();
            saveFormDraft();
        }

        function reindexTickets() {
            const tickets = ticketsContainer.querySelectorAll('.ticket-item');
            ticketCount = 0;
            tickets.forEach((ticket, newIndex) => {
                ticket.id = `ticket-${newIndex}`;
                ticket.querySelector('.remove-ticket-btn').setAttribute('onclick', `removeTicket(${newIndex})`);

                const indexDisplay = ticket.querySelector('.ticket-index-display');
                if (indexDisplay) indexDisplay.textContent = newIndex + 1;

                const inputs = ticket.querySelectorAll('input');
                inputs.forEach(input => {
                    if (input.name) {
                        input.name = input.name.replace(/\[\d+\]/, `[${newIndex}]`);
                    }
                    if (input.id && input.id.startsWith('ticket-value-')) {
                        input.id = `ticket-value-${newIndex}`;
                    }
                    if (input.classList.contains('ticket-value-masked')) {
                        input.setAttribute('data-index', newIndex);
                        input.setAttribute('oninput', `handleTicketPrice(this, ${newIndex})`);
                    }
                    if (input.classList.contains('ticket-free-checkbox')) {
                        input.setAttribute('onchange', `toggleTicketFree(this, ${newIndex})`);
                    }
                });
                ticketCount++;
            });
        }

        window.handleTicketPrice = function (input, index) {
            const raw = input.value;
            input.value = formatCurrencyBR(raw);
            document.getElementById(`ticket-value-${index}`).value = normalizeCurrencyValue(raw);
            saveFormDraft();
        }

        window.toggleTicketFree = function (checkbox, index) {
            const maskedInput = document.querySelector(`.ticket-value-masked[data-index="${index}"]`);
            const hiddenInput = document.getElementById(`ticket-value-${index}`);

            if (checkbox.checked) {
                maskedInput.value = '0,00';
                maskedInput.disabled = true;
                maskedInput.style.background = '#f3f4f6';
                hiddenInput.value = '0.00';
            } else {
                maskedInput.value = '';
                maskedInput.disabled = false;
                maskedInput.style.background = 'white';
                hiddenInput.value = '0.00';
                maskedInput.focus();
            }
            saveFormDraft();
        }

        addTicketBtn.addEventListener('click', () => addTicket());

        // CEP Auto-fill
        const cepInput = document.getElementById('cep');
        const addressInput = document.getElementById('address');
        const cityInput = document.getElementById('city');
        const stateInput = document.getElementById('state');
        const neighborhoodInput = document.getElementById('neighborhood');
        const numberInput = document.getElementById('number');

        cepInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,5})(\d{0,3})/);
            e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2];
        });

        cepInput.addEventListener('blur', function () {
            let cep = this.value.replace(/\D/g, '');
            if (cep.length !== 8) return;

            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (data.erro) {
                        alert('CEP não encontrado.');
                        return;
                    }
                    addressInput.value = data.logradouro || '';
                    neighborhoodInput.value = data.bairro || '';
                    cityInput.value = data.localidade || '';
                    stateInput.value = data.uf || '';
                    numberInput.focus();
                    saveFormDraft();
                })
                .catch(error => {
                    console.error('Erro ao buscar CEP:', error);
                });
        });

        const STORAGE_KEY = 'evently-create-event-draft';

        function formatCurrencyBR(value) {
            const digits = value.replace(/\D/g, '');
            if (!digits) return '';
            const number = Number(digits) / 100;
            return new Intl.NumberFormat('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(number);
        }

        function normalizeCurrencyValue(value) {
            const digits = value.replace(/\D/g, '');
            if (!digits) return '0.00';
            const number = Number(digits) / 100;
            return number.toFixed(2);
        }

        coverInput.addEventListener('change', async function () {
            const file = this.files?.[0];

            if (!file) {
                previewWrapper.style.display = 'none';
                previewImg.removeAttribute('src');
                return;
            }

            if (!file.type.startsWith('image/')) {
                alert('Selecione uma imagem válida.');
                this.value = '';
                previewWrapper.style.display = 'none';
                previewImg.removeAttribute('src');
                return;
            }

            try {
                const resizedFile = await resizeImage(file, 1600, 1600, 0.82);

                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(resizedFile);
                coverInput.files = dataTransfer.files;

                const previewUrl = URL.createObjectURL(resizedFile);
                previewImg.src = previewUrl;
                previewWrapper.style.display = 'block';

                previewImg.onload = () => URL.revokeObjectURL(previewUrl);
            } catch (error) {
                console.error('Erro ao processar imagem:', error);
                this.value = '';
                previewWrapper.style.display = 'none';
                previewImg.removeAttribute('src');
                alert('Não foi possível processar a imagem selecionada.');
            }
        });

        function resizeImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const fileUrl = URL.createObjectURL(file);

                img.onload = () => {
                    let { width, height } = img;

                    if (width > maxWidth || height > maxHeight) {
                        const ratio = Math.min(maxWidth / width, maxHeight / height);
                        width = Math.round(width * ratio);
                        height = Math.round(height * ratio);
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        URL.revokeObjectURL(fileUrl);

                        if (!blob) {
                            reject(new Error('Falha ao gerar imagem redimensionada.'));
                            return;
                        }

                        const compressedFile = new File(
                            [blob],
                            file.name.replace(/\.\w+$/, '.jpg'),
                            { type: 'image/jpeg' }
                        );

                        resolve(compressedFile);
                    }, 'image/jpeg', quality);
                };

                img.onerror = () => {
                    URL.revokeObjectURL(fileUrl);
                    reject(new Error('Falha ao carregar a imagem.'));
                };

                img.src = fileUrl;
            });
        }

        function saveFormDraft() {
            const tickets = [];
            document.querySelectorAll('.ticket-item').forEach(item => {
                const index = item.id.split('-')[1];
                tickets.push({
                    name: item.querySelector(`input[name="eventTicket[${index}].name"]`)?.value || '',
                    valueMasked: item.querySelector('.ticket-value-masked')?.value || '',
                    value: item.querySelector(`input[id="ticket-value-${index}"]`)?.value || '0.00',
                    quantity: item.querySelector(`input[name="eventTicket[${index}].quantity"]`)?.value || '',
                    expirationDate: item.querySelector(`input[name="eventTicket[${index}].expirationDate"]`)?.value || ''
                });
            });

            const draft = {
                title: document.getElementById('title')?.value || '',
                categoryId: document.getElementById('categoryId')?.value || '',
                totalSlots: document.getElementById('totalSlots')?.value || '',
                description: document.getElementById('description')?.value || '',
                eventDate: document.getElementById('eventDate')?.value || '',
                registrationDeadline: document.getElementById('registrationDeadline')?.value || '',
                cep: cepInput?.value || '',
                address: addressInput?.value || '',
                number: numberInput?.value || '',
                complement: document.getElementById('complement')?.value || '',
                neighborhood: neighborhoodInput?.value || '',
                city: cityInput?.value || '',
                state: stateInput?.value || '',
                tickets: tickets
            };

            sessionStorage.setItem(STORAGE_KEY, JSON.stringify(draft));
        }

        function restoreFormDraft() {
            const saved = sessionStorage.getItem(STORAGE_KEY);
            if (!saved) return;

            try {
                const draft = JSON.parse(saved);

                if (document.getElementById('title')) document.getElementById('title').value = draft.title || '';
                if (document.getElementById('categoryId')) document.getElementById('categoryId').value = draft.categoryId || '';
                if (document.getElementById('totalSlots')) document.getElementById('totalSlots').value = draft.totalSlots || '';
                if (document.getElementById('description')) document.getElementById('description').value = draft.description || '';
                if (document.getElementById('eventDate')) document.getElementById('eventDate').value = draft.eventDate || '';
                if (document.getElementById('registrationDeadline')) document.getElementById('registrationDeadline').value = draft.registrationDeadline || '';

                if (cepInput) cepInput.value = draft.cep || '';
                if (addressInput) addressInput.value = draft.address || '';
                if (numberInput) numberInput.value = draft.number || '';
                if (document.getElementById('complement')) document.getElementById('complement').value = draft.complement || '';
                if (neighborhoodInput) neighborhoodInput.value = draft.neighborhood || '';
                if (cityInput) cityInput.value = draft.city || '';
                if (stateInput) stateInput.value = draft.state || '';

                if (draft.tickets && draft.tickets.length > 0) {
                    ticketsContainer.innerHTML = '';
                    ticketCount = 0;
                    draft.tickets.forEach(t => addTicket(t));
                }
            } catch (e) {
                console.error('Erro ao restaurar rascunho:', e);
            }
        }

        function clearFormDraft() {
            sessionStorage.removeItem(STORAGE_KEY);
        }

        restoreFormDraft();

        form.querySelectorAll('input, textarea, select').forEach(field => {
            if (field.id !== 'coverImage' && field.id !== 'value' && field.id !== 'valueMasked') {
                field.addEventListener('input', saveFormDraft);
                field.addEventListener('change', saveFormDraft);
            }
        });

        form.addEventListener('submit', function () {
            clearFormDraft();
        });

        document.querySelectorAll('a[href]').forEach(link => {
            link.addEventListener('click', function () {
                clearFormDraft();
            });
        });
    </script>

</body>

</html>
