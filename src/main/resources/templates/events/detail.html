<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

<head>
    <meta charset="UTF-8">
    <title th:text="${event.title} + ' — Evently'"></title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/event-detail.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar('events')}"></div>

    <div class="detail-page">
        <header class="detail-hero">
            <div class="detail-hero-image">

                <img th:if="${event.coverImage != null}"
                    th:src="${event.coverImage.startsWith('http') ? event.coverImage : '/uploads/' + event.coverImage}"
                    th:alt="${event.title}">

                <div th:if="${event.coverImage == null}" class="detail-image-fallback">
                    Sem imagem
                </div>

                <span th:if="${event.category != null}" class="badge-categoria badge-overlay"
                    th:text="${event.category.name}"></span>
            </div>
        </header>

        <main class="detail-content">
            <section class="detail-main">
                <h1 th:text="${event.title}"></h1>

                <div class="detail-meta-strip">
                    <div class="meta-item">
                        <div class="meta-icon-box">
                            <i data-lucide="calendar"></i>
                        </div>
                        <div class="meta-content">
                            <span class="meta-label">Data e Hora</span>
                            <span class="meta-value"
                                th:text="${#temporals.format(event.eventDate, 'dd/MM/yyyy')} + ' às ' + ${#temporals.format(event.eventDate, 'HH:mm')}"></span>
                        </div>
                    </div>

                    <div class="meta-item">
                        <div class="meta-icon-box">
                            <i data-lucide="users"></i>
                        </div>
                        <div class="meta-content">
                            <span class="meta-label">Disponibilidade</span>
                            <span class="meta-value highlight"
                                th:text="${event.availableSlots} + ' vagas restantes'"></span>
                        </div>
                    </div>
                </div>

                <section class="detail-section">
                    <h2>Sobre o Evento</h2>
                    <p th:text="${event.description}"></p>
                </section>

                <section class="detail-section localization-card">
                    <h2>Local</h2>
                    <div class="localization-info" th:if="${event.eventLocalization != null}">
                        <div class="loc-item">
                            <i data-lucide="navigation"></i>
                            <div>
                                <strong
                                    th:text="${event.eventLocalization.address} + ', ' + ${event.eventLocalization.number}"></strong>
                                <p th:if="${event.eventLocalization.complement != null and !event.eventLocalization.complement.isEmpty()}"
                                    th:text="${event.eventLocalization.complement}"></p>
                                <p th:text="${event.eventLocalization.neighborhood}"></p>
                                <p th:text="${event.eventLocalization.city} + ' - ' + ${event.eventLocalization.state}">
                                </p>
                                <p class="cep-text" th:text="'CEP: ' + ${event.eventLocalization.cep}"></p>

                                <a th:href="'https://www.google.com/maps/search/?api=1&query=' + ${#strings.replace(event.eventLocalization.address + ' ' + event.eventLocalization.number + ' ' + event.eventLocalization.neighborhood + ' ' + event.eventLocalization.city + ' ' + event.eventLocalization.state + ' ' + event.eventLocalization.cep, ' ', '+')}"
                                    target="_blank" class="maps-btn">
                                    <i data-lucide="map-pin"></i> VER NO MAPA
                                </a>
                            </div>
                        </div>
                    </div>
                    <div th:if="${event.eventLocalization == null}" class="localization-info">
                        <p style="color: #6b7280; font-size: 14px;">Endereço não informado.</p>
                    </div>
                </section>
            </section>

            <aside class="detail-sidebar">
                <div class="price-card">
                    <h3
                        style="margin-top: 0; margin-bottom: 20px; font-size: 16px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: 0.05em;">
                        Escolha uma opção</h3>

                    <div class="tickets-list" id="ticketsList">
                        <div th:each="ticket : ${event.tickets}" class="ticket-card" th:with="isExpired=${ticket.expirationDate != null and ticket.expirationDate.isBefore(T(java.time.LocalDate).now())},
                                      isSoldOut=${remainingTickets.get(ticket.id) <= 0}"
                            th:classappend="${isExpired} ? 'expired' : (${isSoldOut} ? 'sold-out' : '')">
                            <div class="ticket-info-side">
                                <span class="ticket-name" th:text="${ticket.name}"></span>
                                <div class="ticket-price-row">
                                    <span class="ticket-price-main"
                                        th:text="${ticket.value == 0 ? 'Grátis' : 'R$ ' + #numbers.formatDecimal(ticket.value, 1, 'POINT', 2, 'COMMA')}"></span>
                                    <span class="ticket-tax" th:if="${ticket.value > 0}"
                                        th:text="${'(+' + #numbers.formatDecimal(ticket.value * 0.1, 1, 'POINT', 2, 'COMMA') + ' taxa)'}"></span>
                                </div>
                                <div class="ticket-installment" th:if="${ticket.value > 100}">em até 12x</div>
                                <div class="ticket-installment" th:if="${ticket.value <= 100 and ticket.value > 0}">em
                                    até 3x</div>
                                <div class="ticket-deadline" th:if="${ticket.expirationDate != null}"
                                    th:style="${isExpired ? 'color: #ef4444; font-weight: 700;' : ''}"
                                    th:text="${isExpired ? 'Lote Encerrado (' + #temporals.format(ticket.expirationDate, 'dd/MM/yyyy') + ')' : 'Vendas até ' + #temporals.format(ticket.expirationDate, 'dd/MM/yyyy')}">
                                </div>
                            </div>

                            <div class="qty-selector" th:if="${!isExpired and !isSoldOut}">
                                <button type="button" class="qty-btn minus" th:data-id="${ticket.id}"
                                    onclick="updateQty(this, -1)" disabled>
                                    <i data-lucide="minus" style="width: 16px; height: 16px;"></i>
                                </button>
                                <span class="qty-value" th:id="'qty-' + ${ticket.id}">0</span>
                                <button type="button" class="qty-btn plus" th:data-id="${ticket.id}"
                                    onclick="updateQty(this, 1)"
                                    th:data-max="${remainingTickets.get(ticket.id) > 5 ? 5 : remainingTickets.get(ticket.id)}">
                                    <i data-lucide="plus" style="width: 16px; height: 16px;"></i>
                                </button>
                            </div>
                            <div class="qty-selector" th:if="${isSoldOut and !isExpired}">
                                <span class="status-badge-sold-out">ESGOTADO</span>
                            </div>
                            <div class="qty-selector" th:if="${isExpired}">
                                <span class="status-badge-expired">ENCERRADO</span>
                            </div>
                        </div>

                        <p th:if="${allTicketsExpired}"
                            style="color: #ef4444; font-size: 14px; text-align: center; padding: 15px; background: #fef2f2; border-radius: 8px; font-weight: 700;">
                            <i data-lucide="alert-circle"
                                style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
                            Inscrições encerradas para este evento.
                        </p>

                        <p th:if="${allTicketsSoldOut and !allTicketsExpired}"
                            style="color: #ef4444; font-size: 14px; text-align: center; padding: 15px; background: #fff7ed; border: 1px solid #ffedd5; border-radius: 8px; font-weight: 700;">
                            <i data-lucide="alert-triangle"
                                style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
                            Ingressos esgotados.
                        </p>

                        <p th:if="${#lists.isEmpty(event.tickets)}"
                            style="color: #6b7280; font-size: 14px; text-align: center; padding: 20px;">Nenhum ingresso
                            disponível no momento.</p>
                    </div>

                    <div class="checkout-section" th:with="allExpired=${allTicketsExpired}">
                        <div th:if="${sucessoInscricao}" style="margin-bottom: 12px; color: #065f46; font-size: 14px;">
                            <span th:text="${sucessoInscricao}"></span>
                        </div>
                        <div th:if="${erroInscricao}" style="margin-bottom: 12px; color: #991b1b; font-size: 14px;">
                            <span th:text="${erroInscricao}"></span>
                        </div>

                        <form th:if="${!allTicketsExpired and !allTicketsSoldOut}"
                            th:action="@{/{id}/checkout(id=${event.id})}" method="post" id="checkoutForm">
                            <input type="hidden" name="selectedTickets" id="selectedTicketsInput">

                            <button type="submit" id="checkoutBtn" class="btn-checkout" disabled>
                                Selecione um ingresso
                            </button>
                        </form>

                        <div th:if="${allTicketsExpired}" class="all-expired-msg">
                            <i data-lucide="calendar-off"></i>
                            Vendas Encerradas
                        </div>

                    </div>
                </div>


            </aside>
        </main>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        lucide.createIcons();

        const selections = {};
        const checkoutBtn = document.getElementById('checkoutBtn');

        function updateQty(btn, delta) {
            const ticketId = btn.getAttribute('data-id');
            if (!selections[ticketId]) selections[ticketId] = 0;

            const newVal = selections[ticketId] + delta;

            if (newVal >= 0) {
                const maxVal = parseInt(btn.parentElement.querySelector('.plus').getAttribute('data-max')) || 5;
                if (newVal > maxVal) return;

                selections[ticketId] = newVal;

                const qtyDisplay = document.getElementById(`qty-${ticketId}`);
                qtyDisplay.textContent = newVal;

                // Update buttons state
                const row = qtyDisplay.parentElement;
                row.querySelector('.minus').disabled = (newVal === 0);
                row.querySelector('.plus').disabled = (newVal === maxVal);

                updateCheckoutButton();
            }
        }

        function updateCheckoutButton() {
            if (!checkoutBtn) return;

            const totalSelected = Object.values(selections).reduce((a, b) => a + b, 0);

            if (totalSelected > 0) {
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = 'Ir para checkout';
                checkoutBtn.style.background = '#10b981'; // Green from image
            } else {
                checkoutBtn.disabled = true;
                checkoutBtn.textContent = 'Selecione um ingresso';
                checkoutBtn.style.background = '#f3f4f6';
            }

            const selectedTicketsInput = document.getElementById('selectedTicketsInput');
            if (selectedTicketsInput) {
                const selected = Object.entries(selections)
                    .filter(([_, qty]) => qty > 0)
                    .map(([ticketId, qty]) => `${ticketId}:${qty}`)
                    .join(',');
                selectedTicketsInput.value = selected;
            }
        }
    </script>
</body>

</html>
