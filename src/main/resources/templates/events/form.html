<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Evento — Evently</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Novo Evento</h1>

    <form th:action="@{/events/new}" th:object="${eventForm}"
          method="post" enctype="multipart/form-data">

        <div class="form-group">
            <label>Título</label>
            <input type="text" th:field="*{title}" required/>
            <span class="field-erro" th:if="${#fields.hasErrors('title')}"
                  th:errors="*{title}"></span>
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <textarea th:field="*{description}" rows="4"></textarea>
            <span class="field-erro" th:if="${#fields.hasErrors('description')}"
                  th:errors="*{description}"></span>
        </div>

        <div class="form-group">
            <label>Data e hora</label>
            <input type="datetime-local" th:field="*{dateTime}" required/>
            <span class="field-erro" th:if="${#fields.hasErrors('dateTime')}"
                  th:errors="*{dateTime}"></span>
        </div>

        <div class="form-group">
            <label>Local</label>
            <input type="text" th:field="*{location}" required/>
            <span class="field-erro" th:if="${#fields.hasErrors('location')}"
                  th:errors="*{location}"></span>
        </div>

        <div class="form-group">
            <label>Total de vagas</label>
            <input type="number" th:field="*{totalSlots}" min="1" required/>
            <span class="field-erro" th:if="${#fields.hasErrors('totalSlots')}"
                  th:errors="*{totalSlots}"></span>
        </div>

        <div class="form-group">
            <label>Categoria</label>
            <select th:field="*{categoryId}">
                <option value="">Selecione...</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
            </select>
        </div>

        <div class="form-group">
            <label>Imagem de capa</label>
            <input type="file" th:field="*{coverImage}" accept="image/*"/>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Criar evento</button>
            <a th:href="@{/events}">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
