<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Evento — Evently</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin-form-edit-event.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar('dashboard')}"></div>

    <main class="edit-page">
        <header class="edit-header">
            <h1>
                <a th:href="@{/admin/my-events}" class="back-btn"><i data-lucide="arrow-left"></i></a>
                Editar Evento
            </h1>
            <p>Atualize as informações do seu evento para manter seus participantes informados.</p>
        </header>

        <form th:action="@{/events/{id}/edit(id=${event.id})}" method="post" th:object="${eventForm}"
            enctype="multipart/form-data">
            <div class="edit-grid">

                <!-- Informações Básicas -->
                <div class="card">
                    <h2>Informações Básicas</h2>

                    <div class="form-group">
                        <label for="title">Título</label>
                        <input type="text" id="title" th:field="*{title}">
                        <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                    </div>

                    <div class="form-group">
                        <label for="description">Descrição</label>
                        <textarea id="description" th:field="*{description}"></textarea>
                        <span class="field-error" th:if="${#fields.hasErrors('description')}"
                            th:errors="*{description}"></span>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventDate">Data do Evento</label>
                            <input type="datetime-local" id="eventDate" th:field="*{eventDate}">
                            <span class="field-error" th:if="${#fields.hasErrors('eventDate')}"
                                th:errors="*{eventDate}"></span>
                        </div>
                        <div class="form-group">
                            <label for="registrationDeadline">Limite de Inscrição</label>
                            <input type="datetime-local" id="registrationDeadline" th:field="*{registrationDeadline}">
                            <span class="field-error" th:if="${#fields.hasErrors('registrationDeadline')}"
                                th:errors="*{registrationDeadline}"></span>
                        </div>
                    </div>

                    <div class="localization-section" style="margin-top: 24px; padding: 20px; background: #f9fafb; border-radius: 12px; border: 1px solid #e5e7eb;">
                        <h3 style="margin-top: 0; margin-bottom: 16px; font-size: 16px; color: #374151;">Localização</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="cep">CEP</label>
                                <input type="text" id="cep" th:field="*{cep}" placeholder="00000-000" maxlength="9">
                            </div>
                            <div class="form-group" style="flex: 2;">
                                <label for="address">Endereço</label>
                                <input type="text" id="address" th:field="*{address}" placeholder="Rua, Avenida...">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="number">Número</label>
                                <input type="text" id="number" th:field="*{number}" placeholder="123">
                            </div>
                            <div class="form-group" style="flex: 2;">
                                <label for="complement">Complemento</label>
                                <input type="text" id="complement" th:field="*{complement}" placeholder="Apto, Bloco...">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="neighborhood">Bairro</label>
                                <input type="text" id="neighborhood" th:field="*{neighborhood}" placeholder="Bairro">
                            </div>
                            <div class="form-group">
                                <label for="city">Cidade</label>
                                <input type="text" id="city" th:field="*{city}" placeholder="Cidade">
                            </div>
                            <div class="form-group">
                                <label for="state">Estado</label>
                                <input type="text" id="state" th:field="*{state}" placeholder="UF" maxlength="2">
                            </div>
                        </div>
                    </div>

                    <div class="form-row" style="align-items: flex-end; margin-top: 24px; margin-bottom: 24px;">
                        <div class="form-group" style="display: flex; align-items: center; gap: 12px; flex-direction: row; margin-bottom: 12px;">
                            <input type="checkbox" id="isFree" style="width: 20px; height: 20px; cursor: pointer;" th:checked="${eventForm.value == 0}">
                            <label for="isFree" style="margin-bottom: 0; cursor: pointer; font-weight: 600;">Este evento é gratuito</label>
                        </div>

                        <div class="form-group">
                            <label for="valueMasked">Valor</label>
                            <input type="text" id="valueMasked" placeholder="0,00" inputmode="numeric" autocomplete="off" th:value="${#numbers.formatDecimal(eventForm.value, 1, 'POINT', 2, 'COMMA')}">
                            <input type="hidden" id="value" th:field="*{value}">
                            <span class="field-error" th:if="${#fields.hasErrors('value')}" th:errors="*{value}"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="totalSlots">Vagas Disponíveis</label>
                            <input type="number" id="totalSlots" th:field="*{totalSlots}">
                            <span class="field-error" th:if="${#fields.hasErrors('totalSlots')}"
                                th:errors="*{totalSlots}"></span>
                        </div>
                        <div class="form-group">
                            <label for="categoryId">Categoria</label>
                            <select id="categoryId" th:field="*{categoryId}">
                                <option value="">Selecione...</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">
                                </option>
                            </select>
                            <span class="field-error" th:if="${#fields.hasErrors('categoryId')}"
                                th:errors="*{categoryId}"></span>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                        <a th:href="@{/admin/my-events}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </div>

                <!-- Imagem e Status -->
                <div class="card">
                    <h2>Imagem do Evento</h2>

                    <div class="current-image">
                        <img th:if="${event.coverImage != null}"
                            th:src="${event.coverImage.startsWith('http') ? event.coverImage : '/uploads/' + event.coverImage}"
                            alt="Capa atual">
                        <span th:if="${event.coverImage == null}" style="color: #6b7280; font-size: 14px;">Sem
                            imagem</span>
                    </div>

                    <p class="image-help">Selecione uma nova imagem para substituir a atual. Formatos recomendados: JPG,
                        PNG (16:9).</p>

                    <label for="coverImage" class="upload-box">
                        <i data-lucide="cloud-upload" style="width: 32px; height: 32px;"></i>
                        <p id="fileName">Nova Imagem</p>
                        <span>Arraste ou clique para trocar</span>
                    </label>
                    <!-- Nome tem que ser coverImage por causa do RequestParam no Controller -->
                    <input type="file" id="coverImage" name="coverImage" accept=".jpg,.jpeg,.png,.webp" hidden>

                    <div class="stats-box">
                        <div class="stat-row">
                            <span class="stat-label">Status Atual</span>
                            <span class="stat-value badge" th:text="${event.eventStatus}"
                                th:style="${event.eventStatus.name() == 'ARQUIVADO' ? 'background: #fee2e2; color: #dc2626;' : ''}">ATIVO</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Inscritos</span>
                            <span class="stat-value"
                                th:text="${event.totalSlots - event.availableSlots} + '/' + ${event.totalSlots}">0/50</span>
                        </div>
                    </div>
                </div>

            </div>
        </form>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        lucide.createIcons();

        document.getElementById('coverImage').addEventListener('change', function (e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : 'Nova Imagem';
            document.getElementById('fileName').textContent = fileName;
        });

        const valueMaskedInput = document.getElementById('valueMasked');
        const valueHiddenInput = document.getElementById('value');
        const isFreeCheckbox = document.getElementById('isFree');

        // CEP Auto-fill
        const cepInput = document.getElementById('cep');
        const addressInput = document.getElementById('address');
        const cityInput = document.getElementById('city');
        const stateInput = document.getElementById('state');
        const neighborhoodInput = document.getElementById('neighborhood');
        const numberInput = document.getElementById('number');

        cepInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,5})(\d{0,3})/);
            e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2];
        });

        cepInput.addEventListener('blur', function() {
            let cep = this.value.replace(/\D/g, '');
            if (cep.length !== 8) return;

            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (data.erro) {
                        alert('CEP não encontrado.');
                        return;
                    }
                    addressInput.value = data.logradouro || '';
                    neighborhoodInput.value = data.bairro || '';
                    cityInput.value = data.localidade || '';
                    stateInput.value = data.uf || '';
                    numberInput.focus();
                })
                .catch(error => {
                    console.error('Erro ao buscar CEP:', error);
                });
        });

        // Free Event Toggle
        function handleFreeToggle() {
            if (isFreeCheckbox.checked) {
                valueMaskedInput.value = '0,00';
                valueHiddenInput.value = '0.00';
                valueMaskedInput.disabled = true;
                valueMaskedInput.style.opacity = '0.5';
                valueMaskedInput.style.backgroundColor = '#f3f4f6';
            } else {
                valueMaskedInput.disabled = false;
                valueMaskedInput.style.opacity = '1';
                valueMaskedInput.style.backgroundColor = 'white';
            }
        }

        isFreeCheckbox.addEventListener('change', handleFreeToggle);
        
        // Initial check on load
        handleFreeToggle();

        function formatCurrencyBR(value) {
            const digits = value.replace(/\D/g, '');
            if (!digits) return '';
            const number = Number(digits) / 100;
            return new Intl.NumberFormat('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(number);
        }

        function normalizeCurrencyValue(value) {
            const digits = value.replace(/\D/g, '');
            if (!digits) return '0.00';
            const number = Number(digits) / 100;
            return number.toFixed(2);
        }

        valueMaskedInput.addEventListener('input', function (e) {
            const raw = e.target.value;
            e.target.value = formatCurrencyBR(raw);
            valueHiddenInput.value = normalizeCurrencyValue(raw);
        });

        valueMaskedInput.addEventListener('blur', function (e) {
            const raw = e.target.value;
            if (!raw) return;
            e.target.value = formatCurrencyBR(raw);
            valueHiddenInput.value = normalizeCurrencyValue(raw);
        });
    </script>
</body>

</html>
