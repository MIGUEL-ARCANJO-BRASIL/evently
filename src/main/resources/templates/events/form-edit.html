<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Evento — Evently</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Editar Evento</h1>

    <form th:action="@{/events/{id}/edit(id=${event.id})}"
          th:object="${eventForm}"
          method="post" enctype="multipart/form-data">
        <div th:if="${#fields.hasAnyErrors()}" style="color:red; padding: 10px; margin-bottom: 10px;">
            <p th:each="err : ${#fields.allErrors()}" th:text="${err}"></p>
        </div>

        <div class="form-group">
            <label>Título</label>
            <input type="text" th:field="*{title}" required/>
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <textarea th:field="*{description}" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label>Data e hora</label>
            <input type="datetime-local" th:field="*{eventDate}"/>
        </div>

        <div class="form-group">
            <label>Local</label>
            <input type="text" th:field="*{location}"/>
        </div>

        <div class="form-group">
            <label>Total de vagas</label>
            <input type="number" th:field="*{totalSlots}" min="1"/>
        </div>

        <div class="form-group">
            <label>Categoria</label>
            <select th:field="*{categoryId}">
                <option value="">Selecione...</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Imagem de capa atual</label>
            <img th:if="${event.coverImage != null}"
                 th:src="@{/uploads/{img}(img=${event.coverImage})}"
                 style="max-width: 200px; display: block; margin-bottom: 8px;"/>

            <label>Trocar imagem (opcional)</label>
            <input type="file" name="coverImage" accept="image/*"/>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Salvar alterações</button>
            <a th:href="@{/events}">Cancelar</a>
        </div>
    </form>

</div>
</body>
</html>
