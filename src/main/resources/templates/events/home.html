<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

<head>
    <meta charset="UTF-8">
    <title>Eventos — Evently</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="events-page">
        <div th:replace="~{fragments/navbar :: navbar('events')}"></div>

        <main class="events-content">

            <div class="filters-row">
                <div class="search-input-wrapper">
                    <form action="/events" method="get" class="search-box" id="mainSearchForm">
                        <input type="hidden" name="category" th:if="${param.category != null}"
                            th:value="${param.category}">
                        <input type="hidden" name="date" th:if="${param.date != null}" th:value="${param.date}">
                        <input type="hidden" name="price" th:if="${param.price != null}" th:value="${param.price}">
                        <input type="hidden" name="city" th:if="${param.city != null}" th:value="${param.city}">
                        <input type="text" name="query" placeholder="O que você está buscando?"
                            th:value="${param.query}">
                    </form>
                </div>

                <!-- Filtro Onde (Cidade) -->
                <div class="filter-group">
                    <button type="button" class="filter-dropdown-btn" id="cityFilterBtn"
                        th:classappend="${param.city != null} ? 'active' : ''">
                        <i data-lucide="map-pin"></i>
                        <span th:text="${param.city != null ? param.city[0] : 'Onde'}">Onde</span>
                        <i data-lucide="chevron-down" class="chevron-icon"></i>
                    </button>

                    <div class="filter-dropdown-menu" id="cityDropdownMenu">
                        <div class="dropdown-search-wrapper">
                            <i data-lucide="search"></i>
                            <input type="text" id="citySearchInput" placeholder="Buscar outra cidade...">
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-section">
                            <span class="dropdown-label">Principais Capitais</span>
                            <div class="dropdown-options" id="cityOptions">
                                <a th:href="@{/events(category=${param.category}, query=${param.query}, date=${param.date}, price=${param.price})}"
                                    class="dropdown-option city-option"
                                    th:classappend="${param.city == null} ? 'active' : ''" data-city="">Qualquer
                                    lugar</a>
                                <a th:each="cap : ${ {'Belo Horizonte', 'Brasília', 'Curitiba', 'Fortaleza', 'Manaus', 'Porto Alegre', 'Recife', 'Rio de Janeiro', 'Salvador', 'São Paulo'} }"
                                    th:href="@{/events(category=${param.category}, query=${param.query}, date=${param.date}, price=${param.price}, city=${cap})}"
                                    class="dropdown-option city-option"
                                    th:classappend="${param.city != null and param.city[0] == cap} ? 'active' : ''"
                                    th:text="${cap}" th:data-city="${cap}"></a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Filtro Quando -->
                <div class="filter-group">
                    <button type="button" class="filter-dropdown-btn" id="dateFilterBtn"
                        th:classappend="${param.date != null} ? 'active' : ''">
                        <i data-lucide="calendar"></i>
                        <span
                            th:text="${param.date != null ? (param.date[0] == 'hoje' ? 'Hoje' : (param.date[0] == 'amanha' ? 'Amanhã' : (param.date[0] == 'fim-de-semana' ? 'Fim de Semana' : param.date[0]))) : 'Quando'}">Quando</span>
                        <i data-lucide="chevron-down" class="chevron-icon"></i>
                    </button>

                    <div class="filter-dropdown-menu" id="dateDropdownMenu">
                        <div class="dropdown-section">
                            <span class="dropdown-label">Sugestões</span>
                            <div class="dropdown-options">
                                <a th:href="@{/events(category=${param.category}, query=${param.query}, price=${param.price})}"
                                    class="dropdown-option"
                                    th:classappend="${param.date == null} ? 'active' : ''">Qualquer data</a>
                                <a th:href="@{/events(category=${param.category}, query=${param.query}, date='hoje', price=${param.price})}"
                                    class="dropdown-option"
                                    th:classappend="${param.date != null and param.date[0] == 'hoje'} ? 'active' : ''">Hoje</a>
                                <a th:href="@{/events(category=${param.category}, query=${param.query}, date='amanha', price=${param.price})}"
                                    class="dropdown-option"
                                    th:classappend="${param.date != null and param.date[0] == 'amanha'} ? 'active' : ''">Amanhã</a>
                                <a th:href="@{/events(category=${param.category}, query=${param.query}, date='fim-de-semana', price=${param.price})}"
                                    class="dropdown-option"
                                    th:classappend="${param.date != null and param.date[0] == 'fim-de-semana'} ? 'active' : ''">Fim
                                    de Semana</a>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-section">
                            <span class="dropdown-label">Escolher data</span>
                            <input type="date" id="customDatePicker" class="custom-date-input"
                                th:value="${param.date != null and param.date[0].contains('-') ? param.date[0] : ''}">
                        </div>
                    </div>
                </div>

                <!-- Filtro Preço -->
                <div class="filter-group">
                    <button type="button" class="filter-dropdown-btn" id="priceFilterBtn"
                        th:classappend="${param.price != null} ? 'active' : ''">
                        <i data-lucide="banknote"></i>
                        <span
                            th:text="${param.price != null ? (param.price[0] == 'gratis' ? 'Grátis' : 'Pago') : 'Preço'}">Preço</span>
                        <i data-lucide="chevron-down" class="chevron-icon"></i>
                    </button>

                    <div class="filter-dropdown-menu" id="priceDropdownMenu">
                        <div class="dropdown-options">
                            <a th:href="@{/events(category=${param.category}, query=${param.query}, date=${param.date})}"
                                class="dropdown-option" th:classappend="${param.price == null} ? 'active' : ''">Qualquer
                                preço</a>
                            <a th:href="@{/events(category=${param.category}, query=${param.query}, date=${param.date}, price='gratis')}"
                                class="dropdown-option"
                                th:classappend="${param.price != null and param.price[0] == 'gratis'} ? 'active' : ''">Grátis</a>
                            <a th:href="@{/events(category=${param.category}, query=${param.query}, date=${param.date}, price='pago')}"
                                class="dropdown-option"
                                th:classappend="${param.price != null and param.price[0] == 'pago'} ? 'active' : ''">Pago</a>
                        </div>
                    </div>
                </div>
            </div>
            <section class="collections-section">
                <div class="section-header">
                    <h2 class="section-title">Explore nossas coleções</h2>
                    <a th:href="@{/events}" class="view-all">Ver tudo</a>
                </div>

                <div class="slider-container">
                    <div class="category-slider" id="categorySlider">
                        <a th:href="@{/events(query=${param.query}, date=${param.date}, price=${param.price})}"
                            class="category-card" th:classappend="${param.category == null} ? 'active' : ''">
                            <i data-lucide="layout-grid"></i>
                            <span>Tudo</span>
                        </a>

                        <a th:each="cat : ${categories}"
                            th:href="@{/events(category=${cat.name}, query=${param.query}, date=${param.date}, price=${param.price})}"
                            class="category-card"
                            th:classappend="${param.category != null and param.category[0] == cat.name} ? 'active' : ''"
                            th:data-category-name="${cat.name}">
                            <i data-lucide="tag"></i>
                            <span th:text="${cat.name}"></span>
                        </a>
                    </div>
                </div>
            </section>
            <div th:if="${sucesso}" class="alert alert-sucesso">
                <span th:text="${sucesso}"></span>
            </div>

            <section class="events-grid">
                <article th:each="event : ${events}" class="event-card">
                    <div class="event-image">
                        <img th:if="${event.coverImage != null}"
                            th:src="${event.coverImage.startsWith('http') ? event.coverImage : '/uploads/' + event.coverImage}"
                            alt="Capa do evento" />
                        <div th:if="${event.coverImage == null}" class="card-sem-imagem">
                            Sem imagem
                        </div>
                        <!-- Removido o bloco redundante de preço aqui -->


                        <span th:if="${event.category != null}" class="badge-categoria"
                            th:text="${event.category.name}"></span>

                        <span class="badge-status" th:text="${event.eventStatus}" th:classappend="${event.eventStatus.name() == 'ATIVO'} ? 'status-ativo' :
                          (${event.eventStatus.name() == 'CANCELADO'} ? 'status-cancelado' :
                          'status-outros')">
                        </span>
                    </div>

                    <div class="event-body">

                        <h2 th:text="${event.title}"></h2>

                        <p th:text="${event.description}"></p>



                        <ul class="event-meta">
                            <li class="meta-item">
                                <i data-lucide="calendar-days" class="meta-icon"></i>
                                <span
                                    th:text="${#temporals.format(event.eventDate, 'dd/MM/yy')} + ' às ' + ${#temporals.format(event.eventDate, 'HH')} + 'h'"></span>
                            </li>

                            <li class="meta-item">
                                <i data-lucide="map-pin" class="meta-icon"></i>
                                <span th:if="${event.eventLocalization != null}"
                                    th:text="${event.eventLocalization.city} + ', ' + ${event.eventLocalization.state}"></span>
                            </li>

                            <li class="meta-item">
                                <i data-lucide="users" class="meta-icon"></i>
                                <span th:text="${event.availableSlots} + ' vagas disponíveis'"></span>
                            </li>
                        </ul>

                        <div class="event-actions">
                            <a th:href="@{/events/{id}(id=${event.id})}" class="btn-details">Ver Detalhes</a>
                        </div>
                    </div>
                </article>
            </section>

            <p th:if="${#lists.isEmpty(events)}" class="empty-state">Nenhum evento disponível.</p>
            <p id="live-empty-state" class="empty-state" style="display: none;">Nenhum evento encontrado para esta
                pesquisa.</p>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </div>

</body>
<script>
    lucide.createIcons();

    document.addEventListener("DOMContentLoaded", () => {
        const searchInput = document.querySelector('input[name="query"]');
        const eventCards = document.querySelectorAll('.event-card');
        const liveEmptyState = document.getElementById('live-empty-state');
        const searchForm = document.getElementById('mainSearchForm');

        // Mapping de ícones por nome de categoria
        const iconMap = {
            'Shows e Festas': 'music',
            'Festa': 'music',
            'Shows': 'mic-2',
            'Teatros e Espetáculos': 'theater',
            'Teatro': 'masks-theater',
            'Stand Up Comedy': 'mic',
            'Esportes': 'trophy',
            'Passeios e Tours': 'map',
            'Cursos e Workshops': 'book-open',
            'Congressos e Palestras': 'presentation',
            'Infantil': 'baby',
            'Dia das mães': 'heart',
            'Gastronomia': 'utensils',
            'Tecnologia': 'cpu',
            'Games': 'gamepad-2',
            'Educação': 'graduation-cap',
            'Saúde': 'heart-pulse',
            'Negócios': 'briefcase'
        };

        // Aplicar ícones dinamicamente
        document.querySelectorAll('.category-card[data-category-name]').forEach(card => {
            const name = card.getAttribute('data-category-name');
            const iconName = iconMap[name] || 'tag';
            const iconElement = card.querySelector('i');
            if (iconElement) {
                iconElement.setAttribute('data-lucide', iconName);
            }
        });

        // Re-inicializar ícones após a troca dos atributos
        lucide.createIcons();

        // Lógica dos dropdowns de filtro
        const setupDropdown = (btnId, menuId) => {
            const btn = document.getElementById(btnId);
            const menu = document.getElementById(menuId);

            if (!btn || !menu) return;

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                // Fechar outros menus
                document.querySelectorAll('.filter-dropdown-menu').forEach(m => {
                    if (m !== menu) m.classList.remove('show');
                });
                document.querySelectorAll('.filter-dropdown-btn').forEach(b => {
                    if (b !== btn) b.classList.remove('open');
                });

                menu.classList.toggle('show');
                btn.classList.toggle('open');
            });
        };

        setupDropdown('dateFilterBtn', 'dateDropdownMenu');
        setupDropdown('priceFilterBtn', 'priceDropdownMenu');
        setupDropdown('cityFilterBtn', 'cityDropdownMenu');

        // Fechar ao clicar fora
        document.addEventListener('click', () => {
            document.querySelectorAll('.filter-dropdown-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.filter-dropdown-btn').forEach(b => b.classList.remove('open'));
        });

        // Lógica de busca de cidades no dropdown
        const citySearchInput = document.getElementById('citySearchInput');
        const cityOptions = document.querySelectorAll('.city-option');

        if (citySearchInput) {
            citySearchInput.addEventListener('input', function () {
                const term = this.value.toLowerCase().trim();
                cityOptions.forEach(opt => {
                    const cityName = opt.getAttribute('data-city').toLowerCase();
                    if (cityName === '' || cityName.includes(term)) {
                        opt.style.display = '';
                    } else {
                        opt.style.display = 'none';
                    }
                });
            });

            // Evitar fechar o menu ao clicar no input de busca
            citySearchInput.addEventListener('click', (e) => e.stopPropagation());
        }

        // Lógica do Calendário (Custom Date Picker)
        const customDatePicker = document.getElementById('customDatePicker');
        if (customDatePicker) {
            customDatePicker.addEventListener('change', function () {
                const selectedDate = this.value;
                if (selectedDate) {
                    const url = new URL(window.location.href);
                    url.searchParams.set('date', selectedDate);
                    window.location.href = url.pathname + url.search;
                }
            });
        }

        if (!searchInput) return;

        // Função de pesquisa ao vivo
        searchInput.addEventListener('input', function () {
            const searchTerm = this.value.toLowerCase().trim();
            let visibleCount = 0;

            eventCards.forEach(card => {
                const title = card.querySelector('h2').textContent.toLowerCase();

                if (title.includes(searchTerm)) {
                    card.style.display = '';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            if (visibleCount === 0 && eventCards.length > 0) {
                liveEmptyState.style.display = 'block';
            } else {
                liveEmptyState.style.display = 'none';
            }

            // Atualizar todos os links de filtros e opções de dropdown para manter o termo de busca
            document.querySelectorAll('.category-card, .dropdown-option, .view-all').forEach(link => {
                const url = new URL(link.href, window.location.origin);
                if (searchTerm) {
                    url.searchParams.set('query', this.value);
                } else {
                    url.searchParams.delete('query');
                }
                link.href = url.pathname + url.search;
            });

            // Atualizar URL silenciosamente
            const currentUrl = new URL(window.location);
            if (this.value) {
                currentUrl.searchParams.set('query', this.value);
            } else {
                currentUrl.searchParams.delete('query');
            }
            window.history.replaceState({}, '', currentUrl);
        });

        if (searchForm) {
            searchForm.addEventListener('submit', (e) => {
                // Permitir o submit normal para filtros de backend funcionarem
                // mas se estiver vazio limpa o parâmetro
                if (!searchInput.value.trim()) {
                    searchInput.disabled = true;
                    searchForm.submit();
                }
            });
        }
    });
</script>

</html>
