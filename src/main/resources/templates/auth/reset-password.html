<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evently — Redefinir Senha</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
    <div class="card">
        <div class="icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <h1 class="brand">Nova Senha</h1>
        <p class="subtitle">Crie uma senha forte para proteger sua conta</p>

        <div th:if="${mensagemErro}" class="alert alert-erro" th:text="${mensagemErro}"></div>

        <form th:action="@{/auth/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}"/>
            
            <div class="field">
                <label>Nova Senha</label>
                <div class="field-wrap">
                    <input type="password" name="password" placeholder="Mínimo 6 caracteres" minlength="6" required/>
                </div>
            </div>

            <button type="submit" class="btn">Redefinir Senha →</button>
        </form>

        <hr class="divider"/>
        <p class="footer-text">Deseja cancelar? <a th:href="@{/auth/login}">Ir para o login</a></p>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
</body>
</html>
