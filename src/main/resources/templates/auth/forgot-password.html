<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evently — Esqueci minha senha</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
    <div class="card">
        <div class="icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
        </div>
        <h1 class="brand">Recuperar Senha</h1>
        <p class="subtitle">Informe seu e-mail para receber as instruções</p>

        <div th:if="${mensagemErro}" class="alert alert-erro" th:text="${mensagemErro}"></div>
        <div th:if="${mensagemSucesso}" class="alert alert-sucesso" th:text="${mensagemSucesso}"></div>

        <form th:action="@{/auth/forgot-password}" method="post">
            <div class="field">
                <label>E-mail cadastrado</label>
                <div class="field-wrap">
                    <input type="email" name="email" th:value="${email}" placeholder="eu@gmail.com" required/>
                </div>
            </div>

            <div class="field">
                <label>CPF</label>
                <div class="field-wrap">
                    <input type="text" name="cpf" id="cpf" th:value="${cpf}" placeholder="000.000.000-00" required/>
                </div>
            </div>

            <div class="field">
                <label>Data de Nascimento</label>
                <div class="field-wrap">
                    <input type="date" name="birthDate" required/>
                </div>
            </div>

            <button type="submit" class="btn">Validar Dados →</button>
        </form>

        <hr class="divider"/>
        <p class="footer-text">Lembrou a senha? <a th:href="@{/auth/login}">Voltar para o login</a></p>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script>
    const inputCpf = document.getElementById('cpf');
    inputCpf?.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, "");
        if (value.length > 11) value = value.slice(0, 11);
        value = value.replace(/^(\d{3})(\d{3})(\d{3})(\d{2}).*/, "$1.$2.$3-$4");
        e.target.value = value;
    });
</script>
</body>
</html>
