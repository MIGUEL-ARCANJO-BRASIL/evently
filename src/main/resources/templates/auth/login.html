<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evently — Login</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
    <div class="card">
        <div class="icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        </div>
        <h1 class="brand">Evently</h1>
        <p class="subtitle">Acesse sua conta para gerenciar eventos</p>

        <div th:if="${mensagemErro}" class="alert alert-erro" th:text="${mensagemErro}"></div>
        <div th:if="${mensagemSucesso}" class="alert alert-sucesso" th:text="${mensagemSucesso}"></div>

        <a th:href="@{/oauth2/authorization/google}" class="btn btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                <path d="M1 1h22v22H1z" fill="none"/>
            </svg>
            Entrar com Google
        </a>

        <div class="divider-text">
            <span>ou entre com e-mail</span>
        </div>

        <form th:action="@{/auth/login}" method="post">
            <div class="field">
                <label>E-mail</label>
                <div class="field-wrap">
                    <input type="email" name="username" placeholder="eu@gmail.com" required/>
                </div>
            </div>

            <div class="field">
                <div class="field-header">
                    <label>Senha</label>
                    <a th:href="@{/auth/forgot-password}" class="forgot">Esqueceu a senha?</a>
                </div>
                <div class="field-wrap">
                    <input type="password" name="password" placeholder="••••••••" required/>
                </div>
            </div>

            <button type="submit" class="btn">Entrar →</button>
        </form>

        <hr class="divider"/>
        <p class="footer-text">Não tem uma conta? <a th:href="@{/auth/register}">Cadastre-se</a></p>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>
</body>
</html>
