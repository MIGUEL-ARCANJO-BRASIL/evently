<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
    <title>Evently — Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-container">
    <h1>Evently</h1>
    <h2>Entrar na sua conta</h2>

    <div th:if="${param.erro}" class="alert alert-erro">
        E-mail ou senha incorretos.
    </div>
    <div th:if="${param.logout}" class="alert alert-sucesso">
        Você saiu com sucesso.
    </div>

    <div th:if="${mensagemErro}"
         style="color: white; background-color: #f44336; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
        <span th:text="${mensagemErro}"></span>
    </div>

    <div th:if="${mensagemSucesso}"
         style="color: white; background-color: #4CAF50; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
        <span th:text="${mensagemSucesso}"></span>
    </div>

    <form th:action="@{/auth/login}" method="post" class="auth-form">
        <input type="email" name="username" placeholder="E-mail" required>
        <input type="password" name="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

    <p class="auth-link">
        Não tem conta? <a th:href="@{/auth/register}">Cadastre-se</a>
    </p>
</div>

</body>
</html>
