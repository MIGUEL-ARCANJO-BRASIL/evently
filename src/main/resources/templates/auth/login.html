<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evently — Login</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
    <div class="card">
        <div class="icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        </div>
        <h1 class="brand">Evently</h1>
        <p class="subtitle">Acesse sua conta para gerenciar eventos</p>

        <div th:if="${mensagemErro}" class="alert alert-erro" th:text="${mensagemErro}"></div>
        <div th:if="${mensagemSucesso}" class="alert alert-sucesso" th:text="${mensagemSucesso}"></div>

        <form th:action="@{/auth/login}" method="post">
            <div class="field">
                <label>E-mail</label>
                <div class="field-wrap">
                    <input type="email" name="username" placeholder="eu@gmail.com" required/>
                </div>
            </div>

            <div class="field">
                <div class="field-header">
                    <label>Senha</label>
                    <a href="#" class="forgot">Esqueceu a senha?</a>
                </div>
                <div class="field-wrap">
                    <input type="password" name="password" placeholder="••••••••" required/>
                </div>
            </div>

            <button type="submit" class="btn">Entrar →</button>
        </form>

        <hr class="divider"/>
        <p class="footer-text">Não tem uma conta? <a th:href="@{/auth/register}">Cadastre-se</a></p>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>
</body>
</html>
