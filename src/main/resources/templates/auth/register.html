<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evently — Cadastro</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
    <div class="card">
        <div class="icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        </div>

        <h1 class="brand">Evently</h1>
        <p class="subtitle">Junte-se à maior rede de eventos locais do país.</p>

        <div th:if="${erro}" class="alert alert-erro" th:text="${erro}"></div>

        <form th:action="@{/auth/register}" method="post" th:object="${usuarioForm}">

            <div class="field">
                <label for="name">Nome Completo</label>
                <div class="field-wrap">
                    <input type="text"
                           id="name"
                           th:field="*{name}"
                           placeholder="Ex: João da Silva"
                           autocomplete="name"
                           required/>
                </div>
                <span class="field-erro"
                      th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"></span>
            </div>

            <div class="field-row">
                <div class="field">
                    <label for="email">E-mail</label>
                    <div class="field-wrap">
                        <input type="email"
                               id="email"
                               th:field="*{email}"
                               placeholder="joao@exemplo.com"
                               autocomplete="email"
                               required/>
                    </div>
                    <span class="field-erro"
                          th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                </div>

                <div class="field">
                    <label for="phone">Telefone</label>
                    <div class="field-wrap">
                        <input type="tel"
                               id="phone"
                               th:field="*{phone}"
                               placeholder="(92) 99999-9999"
                               autocomplete="tel"
                               maxlength="15"
                               required/>
                    </div>
                    <span class="field-erro"
                          th:if="${#fields.hasErrors('phone')}"
                          th:errors="*{phone}"></span>
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label for="cpf">CPF</label>
                    <div class="field-wrap">
                        <input type="text"
                               id="cpf"
                               th:field="*{cpf}"
                               placeholder="000.000.000-00"
                               maxlength="14"
                               required/>
                    </div>
                    <span class="field-erro"
                          th:if="${#fields.hasErrors('cpf')}"
                          th:errors="*{cpf}"></span>
                </div>

                <div class="field">
                    <label for="birthDate">Data de Nascimento</label>
                    <div class="field-wrap">
                        <input type="date"
                               id="birthDate"
                               th:field="*{birthDate}"
                               autocomplete="bday"
                               required/>
                    </div>
                    <span class="field-erro"
                          th:if="${#fields.hasErrors('birthDate')}"
                          th:errors="*{birthDate}"></span>
                </div>
            </div>

            <div class="field">
                <label for="password">Senha</label>
                <div class="field-wrap">
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           placeholder="••••••••"
                           autocomplete="new-password"
                           required/>
                </div>
                <span class="field-hint">Mínimo de 6 caracteres.</span>
                <span class="field-erro"
                      th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>

            <button type="submit" class="btn">Cadastrar agora</button>
        </form>

        <hr class="divider"/>

        <p class="footer-text">
            Já tem uma conta? <a th:href="@{/auth/login}">Entre aqui</a>
        </p>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script>
    const inputCpf = document.getElementById('cpf');
    const inputPhone = document.getElementById('phone');

    inputCpf.addEventListener('input', (e) => {
        let value = e.target.value;
        value = value.replace(/\D/g, "");
        value = value.slice(0, 11);

        if (value.length > 9) {
            value = value.replace(/^(\d{3})(\d{3})(\d{3})(\d{2}).*/, "$1.$2.$3-$4");
        } else if (value.length > 6) {
            value = value.replace(/^(\d{3})(\d{3})(\d{0,3}).*/, "$1.$2.$3");
        } else if (value.length > 3) {
            value = value.replace(/^(\d{3})(\d{0,3}).*/, "$1.$2");
        }

        e.target.value = value;
    });

    inputPhone.addEventListener('input', (e) => {
        let value = e.target.value;
        value = value.replace(/\D/g, "");
        value = value.slice(0, 11);

        if (value.length > 10) {
            value = value.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
        } else if (value.length > 6) {
            value = value.replace(/^(\d{2})(\d{4,5})(\d{0,4}).*/, "($1) $2-$3");
        } else if (value.length > 2) {
            value = value.replace(/^(\d{2})(\d{0,5}).*/, "($1) $2");
        } else if (value.length > 0) {
            value = value.replace(/^(\d*)/, "($1");
        }

        e.target.value = value;
    });
</script>
</body>
</html>
