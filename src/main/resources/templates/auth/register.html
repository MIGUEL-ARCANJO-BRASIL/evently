<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evently — Cadastro</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
    <div class="card">
        <div class="icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        </div>

        <h1 class="brand">Evently</h1>
        <p class="subtitle">Junte-se à maior rede de eventos locais do país.</p>

        <div th:if="${erro}" class="alert alert-erro" th:text="${erro}"></div>

        <a th:href="@{/oauth2/authorization/google}" class="btn btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                <path d="M1 1h22v22H1z" fill="none"/>
            </svg>
            Cadastrar com Google
        </a>

        <div class="divider-text">
            <span>ou cadastre com e-mail</span>
        </div>

        <form th:action="@{/auth/register}" method="post" th:object="${usuarioForm}">

            <div class="field">
                <label for="name">Nome Completo</label>
                <div class="field-wrap">
                    <input type="text"
                           id="name"
                           th:field="*{name}"
                           placeholder="Ex: João da Silva"
                           autocomplete="name"
                           required/>
                </div>
                <span class="field-erro"
                      th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"></span>
            </div>

            <div class="field-row">
                <div class="field">
                    <label for="email">E-mail</label>
                    <div class="field-wrap">
                        <input type="email"
                               id="email"
                               th:field="*{email}"
                               placeholder="joao@exemplo.com"
                               autocomplete="email"
                               required/>
                    </div>
                    <span class="field-erro"
                          th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                </div>

                <div class="field">
                    <label for="phone">Telefone</label>
                    <div class="field-wrap">
                        <input type="tel"
                               id="phone"
                               th:field="*{phone}"
                               placeholder="(92) 99999-9999"
                               autocomplete="tel"
                               maxlength="15"
                               required/>
                    </div>
                    <span class="field-erro"
                          th:if="${#fields.hasErrors('phone')}"
                          th:errors="*{phone}"></span>
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label for="cpf">CPF</label>
                    <div class="field-wrap">
                        <input type="text"
                               id="cpf"
                               th:field="*{cpf}"
                               placeholder="000.000.000-00"
                               maxlength="14"
                               required/>
                    </div>
                    <span class="field-erro"
                          th:if="${#fields.hasErrors('cpf')}"
                          th:errors="*{cpf}"></span>
                </div>

                <div class="field">
                    <label for="birthDate">Data de Nascimento</label>
                    <div class="field-wrap">
                        <input type="date"
                               id="birthDate"
                               th:field="*{birthDate}"
                               autocomplete="bday"
                               required/>
                    </div>
                    <span class="field-erro"
                          th:if="${#fields.hasErrors('birthDate')}"
                          th:errors="*{birthDate}"></span>
                </div>
            </div>

            <div class="field">
                <label for="password">Senha</label>
                <div class="field-wrap">
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           placeholder="••••••••"
                           autocomplete="new-password"
                           required/>
                </div>
                <span class="field-hint">Mínimo de 6 caracteres.</span>
                <span class="field-erro"
                      th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>

            <button type="submit" class="btn">Cadastrar agora</button>
        </form>

        <hr class="divider"/>

        <p class="footer-text">
            Já tem uma conta? <a th:href="@{/auth/login}">Entre aqui</a>
        </p>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script>
    const inputCpf = document.getElementById('cpf');
    const inputPhone = document.getElementById('phone');

    inputCpf.addEventListener('input', (e) => {
        let value = e.target.value;
        value = value.replace(/\D/g, "");
        value = value.slice(0, 11);

        if (value.length > 9) {
            value = value.replace(/^(\d{3})(\d{3})(\d{3})(\d{2}).*/, "$1.$2.$3-$4");
        } else if (value.length > 6) {
            value = value.replace(/^(\d{3})(\d{3})(\d{0,3}).*/, "$1.$2.$3");
        } else if (value.length > 3) {
            value = value.replace(/^(\d{3})(\d{0,3}).*/, "$1.$2");
        }

        e.target.value = value;
    });

    inputPhone.addEventListener('input', (e) => {
        let value = e.target.value;
        value = value.replace(/\D/g, "");
        value = value.slice(0, 11);

        if (value.length > 10) {
            value = value.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
        } else if (value.length > 6) {
            value = value.replace(/^(\d{2})(\d{4,5})(\d{0,4}).*/, "($1) $2-$3");
        } else if (value.length > 2) {
            value = value.replace(/^(\d{2})(\d{0,5}).*/, "($1) $2");
        } else if (value.length > 0) {
            value = value.replace(/^(\d*)/, "($1");
        }

        e.target.value = value;
    });
</script>
</body>
</html>
