<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evently — Cadastro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-container">
    <h1>Evently</h1>
    <h2>Criar conta</h2>

    <div th:if="${erro}" class="alert alert-erro">
        <span th:text="${erro}"></span>
    </div>

    <form th:action="@{/auth/register}" method="post" th:object="${usuarioForm}">

        <div class="form-group">
            <label for="name">Nome completo</label>
            <input type="text" id="name" th:field="*{name}"
                   placeholder="Seu nome" required/>
            <span class="field-erro" th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"></span>
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" th:field="*{email}"
                   placeholder="seu@email.com" required/>
            <span class="field-erro" th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"></span>
        </div>

        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" th:field="*{password}"
                   placeholder="Mínimo 6 caracteres" required/>
            <span class="field-erro" th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}"></span>
        </div>

        <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" th:field="*{cpf}"
                   placeholder="000.000.000-00" required/>
            <span class="field-erro" th:if="${#fields.hasErrors('cpf')}"
                  th:errors="*{cpf}"></span>
        </div>

        <button type="submit" class="btn-primary">Criar conta</button>
    </form>
    <p class="auth-link">
        Já tem conta? <a th:href="@{/login}">Entrar</a>
    </p>
</div>

</body>
</html>
