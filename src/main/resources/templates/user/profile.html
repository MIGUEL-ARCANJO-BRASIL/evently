<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil — Evently</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>

<div class="events-page">
    <div th:replace="~{fragments/navbar :: navbar('profile')}"></div>

    <main class="profile-page">
        <section class="profile-header">
            <h1>Meu Perfil</h1>
            <p>Gerencie suas informações pessoais e configurações de conta.</p>
        </section>

        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div>

        <section class="profile-card">
            <div class="profile-card-head">
                <div>
                    <h2 class="profile-card-title">Informações da Conta</h2>
                    <p class="profile-card-subtitle">Visualize e edite seus dados quando precisar.</p>
                </div>

                <button type="button"
                        class="edit-profile-btn"
                        id="editProfileBtn"
                        aria-label="Editar perfil"
                        title="Editar perfil">
                    <span class="edit-icon">✎</span>
                </button>
            </div>

            <div class="profile-top">
                <div class="profile-avatar-wrap">
                    <div class="profile-avatar">
                        <img id="avatarPreview"
                             th:src="${user.avatar != null and !#strings.isEmpty(user.avatar)} ? (${user.avatar.startsWith('http')} ? ${user.avatar} : '/uploads/' + ${user.avatar}) : ''"
                             alt="Foto de perfil"
                             th:style="${user.avatar != null and !#strings.isEmpty(user.avatar)} ? 'display:block;' : 'display:none;'">

                        <div id="avatarPlaceholder"
                             class="profile-avatar-placeholder"
                             th:style="${user.avatar != null and !#strings.isEmpty(user.avatar)} ? 'display:none;' : 'display:flex;'"
                             th:text="${#strings.substring(user.name, 0, 1).toUpperCase()}">
                        </div>
                    </div>
                </div>

                <div class="profile-avatar-text">
                    <h2>Foto de Perfil</h2>
                    <p>Escolha uma imagem JPG, JPEG, PNG ou WEBP para usar como avatar.</p>
                </div>
            </div>

            <form class="profile-form"
                  id="profileForm"
                  th:action="@{/user/profile}"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${userForm}">

                <div class="form-grid">
                    <div class="field field-full">
                        <label>Avatar</label>

                        <div class="avatar-upload" id="avatarUploadBox">
                            <input type="file"
                                   id="avatarFile"
                                   name="avatarFile"
                                   accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp"
                                   hidden>

                            <label for="avatarFile" class="avatar-picker-btn" id="avatarPickerBtn">
                                Escolher imagem
                            </label>

                            <span class="avatar-file-name" id="avatarFileName">
                                Nenhum arquivo selecionado
                            </span>
                        </div>

                        <span class="field-hint">Formatos aceitos: PNG, JPG, JPEG e WEBP.</span>
                    </div>

                    <div class="field">
                        <label for="name">Nome Completo</label>
                        <div class="field-wrap">
                            <input type="text" id="name" th:field="*{name}" disabled>
                        </div>
                        <span class="field-erro"
                              th:if="${#fields.hasErrors('name')}"
                              th:errors="*{name}"></span>
                    </div>

                    <div class="field">
                        <label for="email">E-mail</label>
                        <div class="field-wrap">
                            <input type="email" id="email" th:field="*{email}" disabled>
                        </div>
                        <span class="field-erro"
                              th:if="${#fields.hasErrors('email')}"
                              th:errors="*{email}"></span>
                    </div>

                    <div class="field">
                        <label for="phone">Telefone</label>
                        <div class="field-wrap">
                            <input type="text" id="phone" th:field="*{phone}" maxlength="15" disabled>
                        </div>
                        <span class="field-erro"
                              th:if="${#fields.hasErrors('phone')}"
                              th:errors="*{phone}"></span>
                    </div>

                    <div class="field">
                        <label for="cpf">CPF</label>
                        <div class="field-wrap">
                            <input type="text" id="cpf" th:field="*{cpf}" maxlength="14" disabled>
                        </div>
                        <span class="field-erro"
                              th:if="${#fields.hasErrors('cpf')}"
                              th:errors="*{cpf}"></span>
                    </div>

                    <div class="field">
                        <label for="birthDate">Data de Nascimento</label>
                        <div class="field-wrap">
                            <input type="date" id="birthDate" th:field="*{birthDate}" disabled>
                        </div>
                        <span class="field-erro"
                              th:if="${#fields.hasErrors('birthDate')}"
                              th:errors="*{birthDate}"></span>
                    </div>
                </div>

                <div class="profile-actions" id="profileActions" hidden>
                    <button type="submit" class="btn-save">Salvar Alterações</button>
                    <button type="button" class="btn-cancel" id="cancelEditBtn">Cancelar</button>
                </div>
            </form>

            <div class="profile-extra-actions">
                <form th:action="@{/logout}" method="post" class="logout-form">
                    <button type="submit" class="btn-logout">Sair da conta</button>
                </form>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script>
    const inputCpf = document.getElementById('cpf');
    const inputPhone = document.getElementById('phone');
    const avatarFile = document.getElementById('avatarFile');
    const avatarPreview = document.getElementById('avatarPreview');
    const avatarPlaceholder = document.getElementById('avatarPlaceholder');
    const avatarFileName = document.getElementById('avatarFileName');
    const avatarPickerBtn = document.getElementById('avatarPickerBtn');

    const editProfileBtn = document.getElementById('editProfileBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const profileActions = document.getElementById('profileActions');
    const profileForm = document.getElementById('profileForm');

    const textFields = profileForm.querySelectorAll('input:not([type="file"])');

    const initialValues = {};
    textFields.forEach((field) => {
        initialValues[field.id] = field.value;
    });

    const initialAvatarSrc = avatarPreview.getAttribute('src') || '';

    function setEditMode(enabled) {
        textFields.forEach((field) => {
            field.disabled = !enabled;
        });

        avatarPickerBtn.classList.toggle('is-disabled', !enabled);
        avatarFile.disabled = !enabled;

        profileActions.hidden = !enabled;
        editProfileBtn.style.display = enabled ? 'none' : 'inline-flex';

        if (enabled) {
            document.getElementById('name')?.focus();
        }
    }

    function resetFormValues() {
        textFields.forEach((field) => {
            if (initialValues[field.id] !== undefined) {
                field.value = initialValues[field.id];
            }
        });

        avatarFile.value = '';
        avatarFileName.textContent = 'Nenhum arquivo selecionado';

        if (initialAvatarSrc) {
            avatarPreview.src = initialAvatarSrc;
            avatarPreview.style.display = 'block';
            avatarPlaceholder.style.display = 'none';
        } else {
            avatarPreview.src = '';
            avatarPreview.style.display = 'none';
            avatarPlaceholder.style.display = 'flex';
        }
    }

    editProfileBtn?.addEventListener('click', () => {
        setEditMode(true);
    });

    cancelEditBtn?.addEventListener('click', () => {
        resetFormValues();
        setEditMode(false);
    });

    avatarPickerBtn?.addEventListener('click', (e) => {
        if (avatarFile.disabled) {
            e.preventDefault();
        }
    });

    avatarFile?.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const allowedTypes = ['image/png', 'image/jpeg', 'image/webp'];
        if (!allowedTypes.includes(file.type)) {
            alert('Selecione uma imagem PNG, JPG, JPEG ou WEBP.');
            avatarFile.value = '';
            avatarFileName.textContent = 'Nenhum arquivo selecionado';
            return;
        }

        avatarFileName.textContent = file.name;

        const imageUrl = URL.createObjectURL(file);
        avatarPreview.src = imageUrl;
        avatarPreview.style.display = 'block';
        avatarPlaceholder.style.display = 'none';
    });

    inputCpf?.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, "").slice(0, 11);

        if (value.length > 9) {
            value = value.replace(/^(\d{3})(\d{3})(\d{3})(\d{2}).*/, "$1.$2.$3-$4");
        } else if (value.length > 6) {
            value = value.replace(/^(\d{3})(\d{3})(\d{0,3}).*/, "$1.$2.$3");
        } else if (value.length > 3) {
            value = value.replace(/^(\d{3})(\d{0,3}).*/, "$1.$2");
        }

        e.target.value = value;
    });

    inputPhone?.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, "").slice(0, 11);

        if (value.length > 10) {
            value = value.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
        } else if (value.length > 6) {
            value = value.replace(/^(\d{2})(\d{4,5})(\d{0,4}).*/, "($1) $2-$3");
        } else if (value.length > 2) {
            value = value.replace(/^(\d{2})(\d{0,5}).*/, "($1) $2");
        } else if (value.length > 0) {
            value = value.replace(/^(\d*)/, "($1");
        }

        e.target.value = value;
    });

    setEditMode(false);
</script>
</body>
</html>
